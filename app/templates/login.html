{% extends "base.html" %}
{% block title %}Login · POS System{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col pos-login-wrap">
      <div class="card pos-card shadow-sm">
        <div class="card-header text-center py-3">
          Sign in
        </div>
        <div class="card-body p-4">
          <p class="text-muted small mb-4 text-center">
            Use your POS account. Session login keeps you signed in on this browser.
          </p>
          <form method="post" action="{{ url_for('ui.login') }}" novalidate>
            <input type="hidden" name="next" value="{{ next_url or '' }}" />
            <div class="mb-3">
              <label for="username" class="form-label fw-semibold">Username</label>
              <input
                type="text"
                class="form-control form-control-lg"
                id="username"
                name="username"
                autocomplete="username"
                required
                placeholder="Enter username"
              />
            </div>
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Password</label>
              <input
                type="password"
                class="form-control form-control-lg"
                id="password"
                name="password"
                autocomplete="current-password"
                required
                placeholder="Enter password"
              />
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-pos-primary btn-lg">
                Log in
              </button>
            </div>
          </form>
        </div>
      </div>
      <p class="text-center text-muted small mt-3 mb-0">
        API clients can continue to use <code>/auth/login</code> (JSON + JWT).
      </p>
    </div>
  </div>
{% endblock %}
